name: Pull request labels

on:
  pull_request_target:
    branches:
      - development
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply path labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Criar labels ausentes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          existing_labels="$(gh label list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json name \
            --jq '.[].name')"

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"

            if ! grep -Fxqi "$name" <<< "$existing_labels"; then
              gh label create "$name" \
                --repo "$GITHUB_REPOSITORY" \
                --color "$color" \
                --description "$description"
            fi
          }

          ensure_label "frontend" "1D76DB" "Alteracoes no frontend"
          ensure_label "backend" "0E8A16" "Alteracoes no backend"
          ensure_label "docs" "0075CA" "Alteracoes na documentacao"
          ensure_label "database" "5319E7" "Alteracoes no banco de dados ou migrations"
          ensure_label "github" "24292F" "Alteracoes em configuracoes do GitHub"
          ensure_label "dependencies" "0366D6" "Alteracoes em dependencias"
          ensure_label "test" "FBCA04" "Alteracoes em testes"
          ensure_label "integration" "6F42C1" "Integracao da development para main"

      - name: Aplicar labels conforme os arquivos alterados
        uses: actions/labeler@v6.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
